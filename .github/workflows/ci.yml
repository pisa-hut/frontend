name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test
      # `npm run build` already runs `tsc -b` before `vite build`, so a
      # standalone typecheck step would compile twice. The `typecheck`
      # script in package.json stays for local use.
      - run: npm run build
